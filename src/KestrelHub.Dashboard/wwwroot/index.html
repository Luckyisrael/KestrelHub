<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KestrelHub</title>
    <base href="/" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" />
    <link href="_content/MudBlazor/MudBlazor.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link href="KestrelHub.Dashboard.styles.css" rel="stylesheet" />
</head>

<body>
    <div id="app">
        <div style="display: flex; justify-content: center; align-items: center; height: 100vh; background: #0a0c0f;">
            <svg width="40" height="40" viewBox="0 0 40 40">
                <circle cx="20" cy="20" r="16" fill="none" stroke="#1e2028" stroke-width="3" />
                <circle cx="20" cy="20" r="16" fill="none" stroke="#00d4ff" stroke-width="3"
                    stroke-dasharray="100" stroke-dashoffset="75" stroke-linecap="round">
                    <animateTransform attributeName="transform" type="rotate" from="0 20 20" to="360 20 20"
                        dur="1s" repeatCount="indefinite" />
                </circle>
            </svg>
        </div>
    </div>

    <div id="blazor-error-ui" style="background:#1a1a2e;color:#e4e6eb;display:none;position:fixed;bottom:0;width:100%;padding:0.6rem 1.25rem;z-index:1000;">
        An unhandled error has occurred.
        <a href="." style="color:#00d4ff;margin-left:8px;">Reload</a>
    </div>

    <script src="_content/MudBlazor/MudBlazor.min.js"></script>
    <script src="_framework/blazor.webassembly.js"></script>
</body>

</html>
